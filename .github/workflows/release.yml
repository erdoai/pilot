name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-cli:
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: pilot-darwin-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: pilot-darwin-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: pilot-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: pilot-linux-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o ${{ matrix.artifact }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-dashboard:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            artifact: pilot-dashboard-macos.zip
          - os: ubuntu-22.04
            platform: linux/amd64
            artifact: pilot-dashboard-linux-amd64.tar.gz
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: dashboard/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build dashboard
        working-directory: dashboard
        run: wails build -clean -nocolour -platform ${{ matrix.platform }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dashboard/build/bin
          zip -r ${{ matrix.artifact }} pilot-dashboard.app

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dashboard/build/bin
          tar czf ${{ matrix.artifact }} pilot-dashboard

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dashboard/build/bin/${{ matrix.artifact }}

  release:
    needs: [build-cli, build-dashboard]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            pilot-darwin-arm64/pilot-darwin-arm64
            pilot-darwin-amd64/pilot-darwin-amd64
            pilot-linux-amd64/pilot-linux-amd64
            pilot-linux-arm64/pilot-linux-arm64
            pilot-dashboard-macos.zip/pilot-dashboard-macos.zip
            pilot-dashboard-linux-amd64.tar.gz/pilot-dashboard-linux-amd64.tar.gz
          generate_release_notes: true
